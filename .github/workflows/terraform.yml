name: Terraform

on:
 push:
   branches:
    - main

permissions:
 contents: read
 id-token: write

concurrency:
 group: terraform-prod
 cancel-in-progress: false

jobs:

 terraform:

   runs-on: ubuntu-latest

   environment: production

   defaults:
     run:
       working-directory: gcp-wif-terraform

   env:
     TF_IN_AUTOMATION: true

   steps:

   - uses: actions/checkout@v4

   - uses: hashicorp/setup-terraform@v3
     with:
      terraform_version: 1.8.5

   - uses: google-github-actions/auth@v2
     with:
      workload_identity_provider: projects/177707171764/locations/global/workloadIdentityPools/github-pool-10/providers/github

      service_account: terraform-sa@gcplearning-15042026.iam.gserviceaccount.com

      token_format: access_token

   - uses: google-github-actions/setup-gcloud@v2

   - run: terraform init

   - run: terraform validate

   - run: terraform plan -input=false

   - run: terraform apply -auto-approve -input=false